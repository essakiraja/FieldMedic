# FieldMedic — Cloud Build CI/CD Pipeline
# Triggers on push to main branch.
# Builds backend Docker image → pushes to Artifact Registry → deploys to Cloud Run.

steps:
  # ── Step 1: Build Docker image ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/fieldmedic/api:$COMMIT_SHA'
      - -t
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/fieldmedic/api:latest'
      - -f
      - backend/Dockerfile
      - backend/
    id: 'build-image'

  # ── Step 2: Push to Artifact Registry ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/fieldmedic/api'
    id: 'push-image'
    waitFor: ['build-image']

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - fieldmedic-api
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/fieldmedic/api:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=$_REGION
      - --set-secrets=GEMINI_API_KEY=gemini-api-key:latest
    id: 'deploy-api'
    waitFor: ['push-image']

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/fieldmedic/api:$COMMIT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/fieldmedic/api:latest'
